name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        java: [11, 17]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Cache local Maven repo
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Compile
        run: mvn -B -ntp clean compile

      - name: Unit tests
        run: mvn -B -ntp test

      - name: Package
        run: mvn -B -ntp package -DskipTests

      - name: Upload jar artifact
        if: matrix.java == 11
        uses: actions/upload-artifact@v4
        with:
          name: rsautomation-jar
          path: target/*.jar

      - name: Coverage report
        if: matrix.java == 11
        run: mvn -B -ntp -Pcoverage test jacoco:report
